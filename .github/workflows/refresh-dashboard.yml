name: Refresh FBA Dashboard

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 7:00 AM Bangkok time (adjust if needed)
  workflow_dispatch: {}    # lets you trigger a manual refresh from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-amazon-sp-api requests python-dotenv

      - name: Run refresh script
        env:
          SP_REFRESH_TOKEN: ${{ secrets.SP_REFRESH_TOKEN }}
          SP_LWA_APP_ID: ${{ secrets.SP_LWA_APP_ID }}
          SP_LWA_CLIENT_SECRET: ${{ secrets.SP_LWA_CLIENT_SECRET }}
          ADS_CLIENT_ID: ${{ secrets.ADS_CLIENT_ID }}
          ADS_CLIENT_SECRET: ${{ secrets.ADS_CLIENT_SECRET }}
          ADS_REFRESH_TOKEN: ${{ secrets.ADS_REFRESH_TOKEN }}
          ADS_PROFILE_ID: ${{ secrets.ADS_PROFILE_ID }}
        run: python sp_api_backend.py --days 30

      - name: Prepare Pages folder
        run: |
          mkdir -p public
          cp amazon-fba-dashboard.html public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
